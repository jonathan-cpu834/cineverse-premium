<script>

const API="/peliculas";

let peliculas=[];
let editandoId=null;

async function cargar(){

const res=await fetch(API);
peliculas=await res.json();

mostrar(peliculas);

document.getElementById("total").innerText=
peliculas.length;
}

function mostrar(datos){

let html="";

datos.forEach(p=>{

html+=`
<tr>
<td>${p.titulo}</td>
<td>${p.genero}</td>
<td>

<button
class="guardar"
onclick="editar(
'${p._id}',
'${p.titulo}',
'${p.genero}'
)">
Editar
</button>

<button
class="eliminar"
onclick="eliminar('${p._id}')">
Eliminar
</button>

</td>
</tr>
`;
});

document.getElementById("lista").innerHTML=html;
}

function filtrar(){

const texto=
document.getElementById("buscar")
.value
.toLowerCase();

const resultado=
peliculas.filter(p=>
p.titulo.toLowerCase().includes(texto) ||
p.genero.toLowerCase().includes(texto)
);

mostrar(resultado);
}

function editar(id,titulo,genero){

editandoId=id;

document.getElementById("titulo").value=
titulo;

document.getElementById("genero").value=
genero;

document.querySelector(".guardar")
.innerText="Actualizar";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

async function guardar(){

const titulo=
document.getElementById("titulo").value.trim();

const genero=
document.getElementById("genero").value.trim();

if(!titulo || !genero){

alert("Completa todos los campos");
return;

}

const datos={
titulo,
genero
};

if(editandoId){

await fetch(API+"/"+editandoId,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(datos)
});

editandoId=null;

document.querySelector(".guardar")
.innerText="Guardar";

}else{

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(datos)
});

}

document.getElementById("titulo").value="";
document.getElementById("genero").value="";

cargar();

}

async function eliminar(id){

if(!confirm("¿Eliminar película?"))
return;

await fetch(API+"/"+id,{
method:"DELETE"
});

cargar();

}

cargar();

</script>
