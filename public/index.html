<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineVerse Premium</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
min-height:100vh;
color:white;
}

header{
padding:30px;
text-align:center;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.1);
}

header h1{
font-size:3rem;
}

header p{
color:#cbd5e1;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.4);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
font-size:2rem;
margin-bottom:10px;
}

.card p{
color:#cbd5e1;
}

.formulario{
background:white;
color:black;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

.formulario h2{
margin-bottom:15px;
}

.inputs{
display:flex;
flex-wrap:wrap;
gap:10px;
}

input{
flex:1;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
}

button{
padding:14px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.guardar{
background:#2563eb;
color:white;
}

.guardar:hover{
background:#1d4ed8;
}

.eliminar{
background:#dc2626;
color:white;
}

.eliminar:hover{
background:#b91c1c;
}

.tabla{
background:white;
color:black;
padding:25px;
border-radius:20px;
}

.buscar{
width:100%;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0f172a;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
text-align:center;
}

footer{
text-align:center;
padding:30px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>
<h1><i class="fa-solid fa-film"></i> CineVerse Premium</h1>
<p>Sistema Profesional de Gestión de Películas</p>
</header>

<div class="container">

<div class="dashboard">

<div class="card">
<h2 id="total">0</h2>
<p>Películas Registradas</p>
</div>

<div class="card">
<h2><i class="fa-solid fa-database"></i></h2>
<p>MongoDB Atlas</p>
</div>

<div class="card">
<h2><i class="fa-brands fa-node-js"></i></h2>
<p>Node.js + Express</p>
</div>

</div>

<div class="formulario">

<h2><i class="fa-solid fa-plus"></i> Agregar Película</h2>

<div class="inputs">
<input type="text" id="titulo" placeholder="Título">
<input type="text" id="genero" placeholder="Género">
<button class="guardar" onclick="guardar()">
Guardar
</button>
</div>

</div>

<div class="tabla">

<input
class="buscar"
type="text"
id="buscar"
placeholder="🔍 Buscar película..."
onkeyup="filtrar()">

<table>

<thead>
<tr>
<th>Título</th>
<th>Género</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<footer>
© 2026 CineVerse Premium | CRUD Full Stack con MongoDB Atlas
</footer>

<script>

const API="/peliculas";
let peliculas=[];

async function cargar(){

const res=await fetch(API);
peliculas=await res.json();

mostrar(peliculas);

document.getElementById("total").innerText=
peliculas.length;
}

function mostrar(datos){

let html="";

datos.forEach(p=>{

html+=`
<tr>
<td>${p.titulo}</td>
<td>${p.genero}</td>
<td>
<button
class="eliminar"
onclick="eliminar('${p._id}')">
Eliminar
</button>
</td>
</tr>
`;
});

document.getElementById("lista").innerHTML=html;
}

function filtrar(){

const texto=
document.getElementById("buscar")
.value
.toLowerCase();

const resultado=
peliculas.filter(p=>
p.titulo.toLowerCase().includes(texto)
);

mostrar(resultado);
}

async function guardar(){

const titulo=
document.getElementById("titulo").value;

const genero=
document.getElementById("genero").value;

if(!titulo || !genero){
alert("Completa todos los campos");
return;
}

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
titulo,
genero
})
});

document.getElementById("titulo").value="";
document.getElementById("genero").value="";

cargar();
}

async function eliminar(id){

if(!confirm("¿Eliminar película?")) return;

await fetch(API+"/"+id,{
method:"DELETE"
});

cargar();
}

cargar();

</script>

</body>
</html>
